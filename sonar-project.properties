# SonarCloud scanner configuration.2
# sonar.projectKey and sonar.organization are injected by the CI pipeline via secrets —
# do not hardcode them here to avoid conflicts with the central workflow's CLI args.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Ignore duplication detection (CPD) in microservice boilerplate code
sonar.cpd.exclusions=apps/**,libs/**,scripts/**,tests/**,*.js,*.sh

# Ignore test coverage requirements for apps (so pipeline isn't blocked)
sonar.coverage.exclusions=apps/**,libs/**,scripts/**,tests/**,*.js,*.sh
